# Render: ONE service (frontend + API together)
# Build runs: install deps, build Vite, install server deps. Start runs Node server (serves API + built frontend).

services:
  - type: web
    name: viet-website
    runtime: node
    buildCommand: git lfs install && git lfs pull && npm install --include=dev && npm run build && cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      # Required for API + database + secure signed uploads:
      # - SUPABASE_URL
      # - SUPABASE_SERVICE_ROLE_KEY  (server only — never expose to browser)
      # - JWT_SECRET  (32+ random chars)
      # When frontend is on Vercel (www.viet.edu.in), set:
      # - FRONTEND_URL=https://www.viet.edu.in
      # After deploy (Supabase SQL Editor):
      # 1) scripts/supabase-storage-policies.sql — revoke anonymous storage INSERT/UPDATE
      # 2) scripts/enable-table-rls.sql — enable RLS on CMS tables (service role bypasses RLS)
      # Do NOT set VITE_SUPABASE_ANON_KEY on the frontend build.
