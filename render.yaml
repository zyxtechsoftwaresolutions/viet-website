# Render: ONE service (frontend + API together)
# Build runs: install deps, build Vite, install server deps. Start runs Node server (serves API + built frontend).

services:
  - type: web
    name: viet-website
    runtime: node
    buildCommand: git lfs install && git lfs pull && npm install --include=dev && npm run build && cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      # Required for API + database
      # - SUPABASE_URL
      # - SUPABASE_SERVICE_ROLE_KEY
      # - JWT_SECRET
      # For admin image uploads in browser (runtime — set on Render, redeploy once):
      # - SUPABASE_ANON_KEY  (same as Supabase Dashboard → Settings → API → anon public)
      # When frontend is on Vercel (www.viet.edu.in), set:
      # - FRONTEND_URL=https://www.viet.edu.in
