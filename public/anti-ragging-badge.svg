<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none" role="img" aria-label="Anti-Ragging Zero Tolerance">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#E1731A"/>
      <stop offset="100%" stop-color="#C45A10"/>
    </linearGradient>
    <linearGradient id="shield" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="80" cy="80" r="76" stroke="url(#gold)" stroke-width="3" fill="#0d1117"/>
  <circle cx="80" cy="80" r="68" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15" fill="none"/>
  <!-- Shield -->
  <path d="M80 28 L108 42 V72 C108 92 96 108 80 116 C64 108 52 92 52 72 V42 Z" fill="url(#shield)" stroke="#E1731A" stroke-width="2"/>
  <!-- Prohibition circle -->
  <circle cx="80" cy="72" r="22" fill="#DC2626" stroke="#ffffff" stroke-width="2.5"/>
  <line x1="64" y1="88" x2="96" y2="56" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <!-- Text arcs -->
  <text x="80" y="138" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2">ANTI RAGGING</text>
  <text x="80" y="152" text-anchor="middle" fill="#E1731A" font-family="Arial, sans-serif" font-size="8" font-weight="600" letter-spacing="1">ZERO TOLERANCE</text>
</svg>
